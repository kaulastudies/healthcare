<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Enterprise Revenue Operations | Vizag Claims Architect</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        @media print { .no-print { display: none; } body { background: white; } }
    </style>
</head>
<body class="bg-slate-100 text-slate-800">
    <div class="max-w-6xl mx-auto p-4 md:p-8">
        <header class="flex justify-between items-center mb-8 no-print">
            <div>
                <h1 class="text-3xl font-extrabold text-indigo-900">Revenue Architect</h1>
                <p class="text-indigo-600">Vizag Operations Command Center</p>
            </div>
            <button onclick="window.print()" class="bg-indigo-900 text-white px-6 py-2 rounded-lg font-bold">Generate Report</button>
        </header>

        <nav class="flex space-x-2 mb-6 no-print">
            <button onclick="switchTab('empanelment')" class="tab-btn px-6 py-2 bg-white rounded-t-lg font-semibold border-b-2 border-indigo-600">Empanelment</button>
            <button onclick="switchTab('audit')" class="tab-btn px-6 py-2 bg-slate-200 rounded-t-lg font-semibold">Claims Audit</button>
            <button onclick="switchTab('preauth')" class="tab-btn px-6 py-2 bg-slate-200 rounded-t-lg font-semibold">Pre-Auth Simulator</button>
        </nav>

        <div id="content" class="bg-white p-8 rounded-b-lg shadow-xl border-t-4 border-indigo-900">
            </div>
    </div>

    <script>
        const content = document.getElementById('content');
        
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.replace('bg-white', 'bg-slate-200'));
            event.target.classList.replace('bg-slate-200', 'bg-white');
            
            if(tab === 'audit') {
                content.innerHTML = `
                    <h2 class="text-xl font-bold mb-4">Revenue Recovery & Leakage Analysis</h2>
                    <form id="auditForm" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                        <input type="text" id="hName" placeholder="Hospital Name" class="p-2 border rounded" required>
                        <select id="leakType" class="p-2 border rounded"><option value="AsstSurgeon">Asst. Surgeon</option><option value="Consumables">Consumables</option></select>
                        <button class="bg-indigo-700 text-white p-2 rounded">Submit Analysis</button>
                    </form>
                    <table class="w-full border"><thead><tr class="bg-slate-100"><th class="p-2 text-left">Hospital</th><th class="p-2 text-left">Leak Type</th><th class="p-2 text-left">Status</th></tr></thead><tbody id="queue"></tbody></table>
                `;
            } else if(tab === 'empanelment') {
                content.innerHTML = `<h2 class="text-xl font-bold mb-4">Empanelment Scorecard & Checklist</h2><div id="empList"></div>`;
            } else {
                content.innerHTML = `<h2 class="text-xl font-bold mb-4">Pre-Auth Eligibility Engine</h2><div class="p-4 bg-slate-50 border rounded"><p>Enter Policy Data to generate Eligibility Score...</p></div>`;
            }
        }
        
        // Initial Load
        switchTab('empanelment');
    </script>
</body>
</html>
